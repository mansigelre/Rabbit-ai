version: '3'
output: structured
tasks:
  setup:
    desc: Complete project setup
    cmds:
      - task: backend:install
      - task: frontend:install
      - echo "✓ Setup complete! Run 'task up' to start services"

  backend:install:
    desc: Install backend dependencies
    dir: backend
    cmds:
      - python -m venv venv
      - cmd: venv\Scripts\pip install -r requirements.txt
        platforms: [windows]
      - cmd: source venv/bin/activate && pip install -r requirements.txt
        platforms: [linux, darwin]

  frontend:install:
    desc: Install frontend dependencies
    dir: frontend
    cmds:
      - npm install

  up:
    desc: Start all services with Docker Compose
    cmds:
      - docker-compose up -d
      - echo "✓ Services started. Frontend: http://localhost:3000, Backend: http://localhost:8000"

  down:
    desc: Stop all services
    cmds:
      - docker-compose down

  logs:
    desc: View service logs
    cmds:
      - docker-compose logs -f

  logs:backend:
    desc: View backend logs
    cmds:
      - docker-compose logs -f backend

  logs:frontend:
    desc: View frontend logs
    cmds:
      - docker-compose logs -f frontend

  build:
    desc: Build Docker images
    cmds:
      - docker-compose build

  rebuild:
    desc: Rebuild Docker images without cache
    cmds:
      - docker-compose build --no-cache

  rebuild:
    desc: Rebuild and restart all services
    cmds:
      - docker-compose down
      - docker-compose build --no-cache
      - docker-compose up -d

  dev:
    desc: Start services with live reload
    cmds:
      - task: up
      - task: logs

  test:
    desc: Run tests
    cmds:
      - echo "Testing project..."
      - cd backend && python -m py_compile main.py
      - echo "✓ Backend syntax OK"

  lint:backend:
    desc: Lint backend code
    dir: backend
    cmds:
      - pylint main.py || true

  lint:frontend:
    desc: Lint frontend code
    dir: frontend
    cmds:
      - npm run lint || true

  health:
    desc: Check service health
    cmds:
      - curl -s http://localhost:8000/health | jq .
      - echo "Frontend running: curl -s http://localhost:3000"

  docs:
    desc: Open API documentation
    cmds:
      - echo "Opening API docs at http://localhost:8000/docs"

  clean:
    desc: Clean up all containers and volumes
    cmds:
      - docker-compose down -v
      - echo "✓ Cleaned up"
